<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTerminalPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <!-- Tailwind Config (убирает предупреждение) -->
  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {}
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 overflow-hidden">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 sidebar flex flex-col">
      <div class="p-6 border-b border-cyan-500/20">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/50">
            <i class="fas fa-terminal text-white text-2xl"></i>
          </div>
          <div>
            <h1 class="text-3xl font-bold tracking-tighter bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent">
              GTerminalPro
            </h1>
            <p class="text-xs text-cyan-400/70 -mt-1">SQLite • Pro</p>
          </div>
        </div>
      </div>

      <div class="p-4 flex-1 overflow-auto custom-scroll">
        <div class="px-4 mb-4">
          <h3 class="text-xs uppercase tracking-widest text-slate-400 font-medium">Открытые окна</h3>
          <div class="text-[10px] text-slate-500 mt-0.5">Добавляйте новые окна через «Администрирование → + Новое окно»</div>
        </div>
        <div class="window-list space-y-1" id="window-list"></div>
      </div>

      <div class="p-4 border-t border-cyan-500/10 mt-auto">
        <div class="flex items-center gap-3 px-4 py-3 bg-slate-900/50 rounded-2xl">
          <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
          <span class="text-sm text-emerald-400">Подключено к базе</span>
        </div>
      </div>
    </div>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Top Bar -->
      <div class="h-14 bg-slate-900 border-b border-slate-700 flex items-center px-6 justify-between flex-shrink-0">
        <div class="flex items-center gap-4">
          <h2 class="text-xl font-semibold text-white" id="window-title">GTerminalPro</h2>
          <div class="px-3 py-1 text-xs bg-slate-800 text-cyan-400 rounded-full font-mono">main.db</div>
        </div>

        <div class="flex items-center gap-6 text-slate-400">
          <button class="hover:text-white transition-colors">
            <i class="fas fa-search"></i>
          </button>
          <button class="hover:text-white transition-colors">
            <i class="fas fa-history"></i>
          </button>
          <button onclick="toggleConsole()" class="hover:text-white transition-colors">
            <i class="fas fa-terminal"></i>
          </button>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-2 text-sm">
            <div class="w-7 h-7 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full"></div>
            <span>admin</span>
          </div>
        </div>
      </div>

      <!-- Content Area - Главное исправление -->
      <div class="flex-1 p-5 overflow-hidden bg-slate-900" id="current-window">
        <!-- Динамическое содержимое -->
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
